<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport"
        content="width=device-width, user-scalable=no, initial-scale=1.0">
  <title>붐업분다</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Noto+Sans+KR:wght@400;700&display=swap"
        rel="stylesheet">
  <link th:href="@{/boom.css}" rel="stylesheet">
</head>
<body>

<h1>붐업붐다</h1>
<p class="subtitle">UP or DOWN, 운명을 정해라</p>

<!-- 이름 입력 폼 -->
<form class="add-form" th:action="@{/boom/players}" method="post">
  <input type="text" name="name" placeholder="이름 입력..." maxlength="10" required>
  <button type="submit" class="btn-add">추가</button>
</form>

<!-- 참여자 없을 때 -->
<div class="empty-state" th:if="${#lists.isEmpty(players)}">
  <div class="emoji">👆👇</div>
  <p>이름을 추가해서 시작하세요!</p>
</div>

<!-- 참여자 카드 목록 -->
<div class="player-grid" th:unless="${#lists.isEmpty(players)}">
  <div class="player-card" th:each="player, stat : ${players}">

    <div class="avatar"
         th:style="'background:' + ${avatarColors[stat.index % avatarColors.length]}">
      <span th:text="${#strings.substring(player.userName, 0, 1)}"></span>
    </div>

    <p class="player-name" th:text="${player.userName}"></p>

    <div class="score"
         th:text="${player.cnt > 0 ? '+' + player.cnt : player.cnt}"
         th:classappend="${player.cnt > 0} ? 'score-positive'
                         : (${player.cnt < 0} ? 'score-negative' : 'score-zero')">
    </div>

    <div class="btn-row">
      <form th:action="@{/boom/players/{id}/vote(id=${player.userId})}"
            method="post" style="flex:1; display:flex;">
        <input type="hidden" name="direction" value="up">
        <button type="submit" class="btn-vote btn-up">
          <span class="emoji">👍</span>
          <span class="label">붐업</span>
        </button>
      </form>
      <form th:action="@{/boom/players/{id}/vote(id=${player.userId})}"
            method="post" style="flex:1; display:flex;">
        <input type="hidden" name="direction" value="down">
        <button type="submit" class="btn-vote btn-down">
          <span class="emoji">👎</span>
          <span class="label">붐다</span>
        </button>
      </form>
    </div>

  </div>
</div>

<!-- 하단 -->
<div class="footer-area" th:unless="${#lists.isEmpty(players)}">
  <p class="player-count"
     th:text="'총 ' + ${#lists.size(players)} + '명 참여 중'"></p>
  <form th:action="@{/boom/players/reset}" method="post">
    <button type="submit" class="btn-reset">전체 점수 초기화</button>
  </form>
</div>

</body>
</html>
